<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="The Pitched Fort submark">
  <!-- rounded navy badge -->
  <rect x="2" y="2" width="116" height="116" rx="26" fill="#22395B"/>
  <!-- twinkling stars -->
  <g fill="#D9B26A">
    <path d="M30 28 l1.7 3.8 4 .5-3 2.9.8 4-3.5-2-3.5 2 .8-4-3-2.9 4-.5z"/>
    <circle cx="90" cy="38" r="1.9"/>
    <circle cx="80" cy="22" r="1.3"/>
    <circle cx="26" cy="46" r="1.3"/>
  </g>
  <!-- crescent moon -->
  <circle cx="86" cy="28" r="9.5" fill="#ECD6A8"/>
  <circle cx="90" cy="25.5" r="8" fill="#22395B"/>
  <!-- teepee -->
  <path d="M60 38 L86 96 H34 Z" fill="none" stroke="#FBF5EB" stroke-width="3.4" stroke-linejoin="round"/>
  <!-- blush doorway -->
  <path d="M60 62 L49.5 96 H70.5 Z" fill="#EBB7BE"/>
  <!-- center pole -->
  <path d="M60 38 V62" stroke="#9DB29A" stroke-width="3.4" stroke-linecap="round"/>
  <!-- crossed top poles -->
  <path d="M60 38 L54 31 M60 38 L66 31" stroke="#FBF5EB" stroke-width="2.8" stroke-linecap="round"/>
  <!-- pennant flag -->
  <path d="M60 31 V23 L70 26.5 L60 31" fill="#9DB29A"/>
</svg>
